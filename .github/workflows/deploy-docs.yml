name: Deploy Docs

on:
    push:
        branches:
            - main
        paths:
            - docs/**
            - src/**
            - .github/workflows/deploy-docs.yml
    workflow_dispatch:

permissions:
    contents: read

concurrency:
    group: pages
    cancel-in-progress: false

jobs:
    build-docs:
        name: Build Docs
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Setup .NET
              uses: actions/setup-dotnet@v4
              with:
                  dotnet-version: 10.0.x

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: '22'
                  cache: npm
                  cache-dependency-path: docs/package-lock.json

            - name: Build src packages
              run: dotnet build src/ -c Release --nologo

            - name: Install xmldocmd
              run: dotnet tool install --global xmldocmd --version 2.9.0

            - name: Install docs dependencies
              run: npm ci
              working-directory: docs

            - name: Generate API reference
              run: bash docs/scripts/generate-api.sh

            - name: Build docs
              run: npm run build
              working-directory: docs
              env:
                  GH_API_TOKEN: ${{ secrets.GH_API_TOKEN }}
                  GITHUB_ACTIONS: 'true'

            - name: Upload Pages artifact
              uses: actions/upload-pages-artifact@v3
              with:
                  path: docs/dist

    deploy:
        name: Deploy
        needs: build-docs
        runs-on: ubuntu-latest
        environment:
            name: github-pages
            url: ${{ steps.deployment.outputs.page_url }}
        permissions:
            pages: write
            id-token: write
        steps:
            - name: Deploy to GitHub Pages
              id: deployment
              uses: actions/deploy-pages@v4
